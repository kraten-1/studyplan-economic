<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMU Econ Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Sarabun',sans-serif;font-size:15px;background:#fff0f5;color:#2d3748}

    /* ── Segmented toggle ── */
    .seg-wrap{display:inline-flex;background:#e2e8f0;border-radius:22px;padding:3px;gap:0}
    .seg-opt{border:none;padding:5px 16px;border-radius:19px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;color:#718096;background:transparent;white-space:nowrap;line-height:1.4}
    .seg-opt.active{background:#fff;color:#2d3748;box-shadow:0 1px 3px rgba(0,0,0,.15)}
    .seg-opt:disabled{opacity:.38;cursor:not-allowed}
    /* Language toggle – fixed top-right */
    .lang-toggle{position:fixed;top:14px;right:14px;z-index:999;box-shadow:0 2px 8px rgba(0,0,0,.13);border-radius:22px}
    /* Back to hub */
    .hub-back{position:fixed;top:14px;left:14px;z-index:999;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:20px;padding:7px 16px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(102,126,234,.4)}
    .hub-back:hover{opacity:.9}
    /* Save for grades button */
    .btn-save-grades{display:block;width:100%;max-width:400px;margin:12px auto 0;padding:13px;background:linear-gradient(135deg,#553c9a,#7c3aed);color:#fff;border:none;border-radius:12px;font-family:'Sarabun',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(124,58,237,.35)}
    .btn-save-grades:hover{opacity:.9}
    /* Program selector */
    .prog-row{display:flex;justify-content:center;margin-bottom:20px}
    .prog-seg .seg-opt{padding:9px 28px;font-size:15px}
    .prog-seg .seg-opt.active{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 2px 8px rgba(102,126,234,.4)}

    /* SETUP */
    .setup-wrap{max-width:740px;margin:0 auto;padding:24px 14px 40px}
    .setup-header{text-align:center;margin-bottom:18px}
    .setup-header h1{font-size:24px;font-weight:700;color:#1a365d}
    .setup-header p{color:#718096;font-size:13.5px;margin-top:5px;line-height:1.5}
    .tip-bar{background:#fffbeb;border:1px solid #f6e05e;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#744210;display:flex;gap:8px;align-items:flex-start}
    .tip-bar .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .tip-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
    .tip-chip.none   {background:#edf2f7;color:#718096}
    .tip-chip.current{background:#e9d8fd;color:#553c9a}
    .tip-chip.done   {background:#c6f6d5;color:#22543d}
    .year-row{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:13px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .year-row label{font-weight:600;white-space:nowrap;font-size:14px}
    .year-row select{flex:1;padding:7px 10px;border:1px solid #e2e8f0;border-radius:8px;font-family:'Sarabun',sans-serif;font-size:14px}
    .acc-section{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
    .acc-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none;font-weight:700;font-size:14.5px;color:#1a365d}
    .acc-header:hover{background:#f7fafc}
    .acc-right{display:flex;align-items:center;gap:8px}
    .acc-cr-badge{font-size:12px;padding:2px 9px;border-radius:10px;background:#e2e8f0;color:#4a5568;font-weight:600}
    .acc-body{border-top:2px solid #e2e8f0;display:none}
    .acc-body.open{display:block}
    .grp-req-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#f7fafc;border-bottom:1px solid #e2e8f0}
    .grp-req-hdr .lbl{font-size:13px;font-weight:700;color:#2d3748}
    .tag-req{font-size:11px;background:#e2e8f0;color:#4a5568;padding:2px 8px;border-radius:20px;font-weight:600}
    .grp-pick{margin:10px 12px;border:2px solid #90cdf4;border-radius:10px;overflow:hidden}
    .grp-pick-hdr{background:#ebf8ff;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
    .grp-pick-title{font-size:13px;font-weight:700;color:#2b6cb0}
    .pick-cnt{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:700;transition:all .2s}
    .pick-cnt.ok{background:#c6f6d5;color:#22543d}
    .pick-cnt.ng{background:#fed7d7;color:#c53030}
    .tbl-head{display:grid;grid-template-columns:62px 1fr 38px 130px;gap:6px;padding:5px 12px;font-size:11px;color:#a0aec0;font-weight:600;letter-spacing:.03em;border-bottom:1px solid #f0f4f8;text-transform:uppercase}
    .c-row{display:grid;grid-template-columns:62px 1fr 38px 130px;gap:6px;padding:6px 12px;align-items:center;transition:background .15s,border-left .15s;border-bottom:1px solid #f7fafc;border-left:3px solid transparent}
    .c-row:last-child{border-bottom:none}
    .c-row:hover{background:#f7fafc}
    .c-row.current{background:#faf5ff;border-left-color:#b794f4}
    .c-row.done{background:#f0fff4;border-left-color:#68d391}
    .grp-pick .c-row{border-bottom:1px solid #bee3f8}
    .grp-pick .c-row:last-child{border-bottom:none}
    .td-code{font-weight:700;font-size:12px;color:#4a5568}
    .td-name{font-size:13px;line-height:1.3}
    .td-cr{font-size:12px;color:#a0aec0;text-align:center}
    .td-act{display:flex;align-items:center;gap:5px;justify-content:flex-end}
    .s-btn{font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;border:1.5px solid transparent;border-radius:20px;padding:4px 11px;cursor:pointer;white-space:nowrap;transition:all .15s}
    .s-btn.none   {background:#edf2f7;color:#718096;border-color:#e2e8f0}
    .s-btn.current{background:#e9d8fd;color:#553c9a;border-color:#d6bcfa}
    .s-btn.done   {background:#c6f6d5;color:#22543d;border-color:#9ae6b4}
    .g-input{width:42px;padding:3px 5px;border:1.5px solid #e2e8f0;border-radius:6px;font-family:'Sarabun',sans-serif;font-size:12px;text-align:center}
    .custom-add{display:flex;gap:7px;padding:8px 12px;flex-wrap:wrap;background:#f7fafc;border-bottom:1px solid #e2e8f0}
    .custom-add input{flex:1;min-width:80px;padding:5px 9px;border:1px solid #e2e8f0;border-radius:7px;font-family:'Sarabun',sans-serif;font-size:13px}
    .custom-add input::placeholder{color:#a0aec0}
    .btn-add{background:#ebf4ff;color:#2b6cb0;border:none;border-radius:7px;padding:5px 12px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;white-space:nowrap}
    .btn-add:hover{background:#bee3f8}
    .custom-list{padding:0 12px 6px}
    .custom-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f0f4f8;font-size:13px}
    .btn-remove{background:none;border:none;color:#fc8181;cursor:pointer;font-size:17px;padding:0 3px;line-height:1}
    .btn-gen{display:block;width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;cursor:pointer;margin-top:20px}
    .btn-gen:hover{opacity:.9}

    /* RESULT */
    .result-wrap{max-width:820px;margin:0 auto;padding:24px 14px}
    .btn-back{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:14px;color:#4a5568;margin-bottom:16px}
    .btn-back:hover{background:#f7fafc}
    h1.t-title{font-size:21px;font-weight:700;color:#1a365d;margin-bottom:5px}
    .subtitle{font-size:13.5px;color:#718096;margin-bottom:10px}
    .progress-bar-wrap{background:#e2e8f0;border-radius:8px;height:10px;width:100%;margin:4px 0 5px}
    .progress-bar-fill{height:10px;border-radius:8px;background:linear-gradient(90deg,#48bb78,#38a169)}
    .legend{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;align-items:center}
    .legend>span:first-child{font-size:12px;color:#718096}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:9px;margin-bottom:18px}
    .card{background:#fff;border-radius:10px;padding:11px 13px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #ccc}
    .card.done{border-left-color:#48bb78}.card.warn{border-left-color:#ed8936}.card.miss{border-left-color:#fc8181}
    .card-label{font-size:12px;color:#718096;font-weight:500}
    .card-value{font-size:19px;font-weight:700;margin-top:1px}
    .card.done .card-value{color:#276749}.card.warn .card-value{color:#c05621}.card.miss .card-value{color:#c53030}
    .tree{list-style:none;padding-left:0}.tree li{margin:3px 0}
    .tree ul{list-style:none;padding-left:20px;border-left:2px solid #e2e8f0;margin-left:8px}
    .node-label{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:6px;cursor:pointer;user-select:none;font-weight:500;transition:background .15s}
    .node-label:hover{background:#edf2f7}
    .node-label.section{font-size:14.5px;font-weight:700;background:#ebf4ff;color:#2b6cb0;padding:7px 14px;margin-bottom:3px}
    .node-label.section:hover{background:#bee3f8}
    .toggle-icon{font-size:10px;color:#a0aec0;min-width:12px}
    .badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap}
    .badge.done{background:#c6f6d5;color:#22543d}.badge.miss{background:#fed7d7;color:#742a2a}
    .badge.warn{background:#feebc8;color:#7b341e}.badge.info{background:#bee3f8;color:#2a4365}
    .course-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:5px;font-size:12.5px;margin:2px 2px}
    .course-chip.done   {background:#f0fff4;border:1px solid #9ae6b4;color:#276749}
    .course-chip.miss   {background:#fff5f5;border:1px solid #feb2b2;color:#c53030}
    .course-chip.opt    {background:#f7fafc;border:1px solid #cbd5e0;color:#4a5568}
    .course-chip.current{background:#faf5ff;border:1px solid #d6bcfa;color:#553c9a}
    .course-list{padding:5px 10px 4px}
    .collapsible{display:none}.collapsible.open{display:block}
    .grade-tag{font-size:10.5px;color:#718096}
    .note{font-size:12px;color:#718096;padding:4px 10px;font-style:italic}
    .support-box{margin-top:30px;background:linear-gradient(135deg,#faf5ff,#f0e6ff);border:1px solid #d6bcfa;border-radius:16px;padding:22px;text-align:center}
    .support-box h3{font-size:16px;font-weight:700;color:#553c9a;margin-bottom:6px}
    .support-box p{font-size:13.5px;color:#718096;margin-bottom:14px}
    .support-links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
    .sup-link{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;border-radius:12px;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(0,0,0,.18)}
    .sup-link:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.28)}
    .sup-link svg{display:block}

    /* ── Search bar ── */
    .search-wrap{background:#fff;border-radius:12px;padding:13px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .search-input-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .search-input-row input{flex:1;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-family:'Sarabun',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
    .search-input-row input:focus{border-color:#667eea}
    .search-clear{background:none;border:none;color:#a0aec0;cursor:pointer;font-size:16px;padding:2px 6px;line-height:1;border-radius:4px;transition:all .15s}
    .search-clear:hover{color:#4a5568;background:#f0f4f8}
    .status-filters{display:flex;flex-wrap:wrap;gap:6px}
    .sf-btn{font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;border:1.5px solid #e2e8f0;background:#f7fafc;color:#718096;cursor:pointer;transition:all .15s;white-space:nowrap}
    .sf-btn:hover{border-color:#a0aec0;color:#4a5568}
    .sf-btn.sf-active-all{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:#667eea}
    .sf-btn.sf-active-none{background:#edf2f7;color:#2d3748;border-color:#a0aec0}
    .sf-btn.sf-active-current{background:#e9d8fd;color:#553c9a;border-color:#d6bcfa}
    .sf-btn.sf-active-done{background:#c6f6d5;color:#22543d;border-color:#9ae6b4}
    .search-panel{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
    .search-count{font-size:12px;color:#718096;padding:8px 14px 4px;font-weight:600}
    .search-empty{text-align:center;color:#a0aec0;font-size:13.5px;padding:24px}

    @media(max-width:560px){
      .tbl-head,.c-row{grid-template-columns:56px 1fr 28px auto}
      .td-name{font-size:12px}.s-btn{font-size:11px;padding:3px 8px}
      .prog-seg .seg-opt{padding:8px 18px;font-size:14px}
    }
  </style>
</head>
<body>

<!-- Language toggle (fixed top-right) -->
<div class="lang-toggle">
  <div class="seg-wrap">
    <button class="seg-opt active" id="lt-th" onclick="setLang('th')">TH</button>
    <button class="seg-opt" id="lt-en" onclick="setLang('en')">EN</button>
  </div>
</div>

<button class="hub-back" onclick="window.location.href='./'">← กลับหน้าหลัก</button>

<!-- SCREEN 1: SETUP -->
<div id="screen-setup">
  <div class="setup-wrap">

    <!-- Program selector -->
    <div class="prog-row">
      <div class="seg-wrap prog-seg">
        <button class="seg-opt active" id="pt-regular" onclick="setProg('regular')">ภาคปกติ</button>
        <button class="seg-opt"        id="pt-intl"    onclick="setProg('intl')">นานาชาติ</button>
      </div>
    </div>

    <div class="setup-header">
      <h1>🎓 CMU Econ Planner</h1>
      <p id="txt-subtitle"></p>
    </div>
    <div class="tip-bar">
      <span>💡</span>
      <div>
        <strong id="txt-tip-title"></strong> <span id="txt-tip-body"></span>
        <div class="chips">
          <span class="tip-chip none"    id="txt-chip-none"></span>
          <span style="color:#718096;font-size:13px">→</span>
          <span class="tip-chip current" id="txt-chip-cur"></span>
          <span style="color:#718096;font-size:13px">→</span>
          <span class="tip-chip done"    id="txt-chip-done"></span>
        </div>
      </div>
    </div>
    <div class="year-row">
      <label id="txt-year-label"></label>
      <select id="sel-ys"></select>
    </div>
    <div class="search-wrap">
      <div class="search-input-row">
        <input type="text" id="search-input" placeholder="" oninput="onSearch()" autocomplete="off">
        <button class="search-clear" id="search-clear-btn" onclick="clearSearch()" style="display:none">✕</button>
      </div>
      <div class="status-filters" id="status-filters"></div>
    </div>
    <div id="form-sections"></div>
    <div id="search-results-panel" style="display:none"></div>
    <button class="btn-gen" id="txt-btn-gen" onclick="generateResult()"></button>
    <button class="btn-save-grades" onclick="saveForGrades()">📊 บันทึกวิชาที่กำลังเรียน → ส่งไปคำนวณเกรด</button>
  </div>
</div>

<!-- SCREEN 2: RESULT -->
<div id="screen-result" style="display:none">
  <div class="result-wrap">
    <button class="btn-back" id="txt-btn-back" onclick="goBack()"></button>
    <div id="result-content"></div>


    <div class="support-box">
      <h3>💜 <span id="txt-support-title"></span></h3>
      <p id="txt-support-body"></p>
      <div class="support-links">
        <a href="https://www.instagram.com/meclips_official/" class="sup-link" target="_blank" rel="noopener" title="Instagram">
          <svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <defs><radialGradient id="ig-rg" cx="30%" cy="107%" r="150%">
              <stop offset="0%" stop-color="#fdf497"/><stop offset="20%" stop-color="#fd5949"/>
              <stop offset="55%" stop-color="#d6249f"/><stop offset="90%" stop-color="#285AEB"/>
            </radialGradient></defs>
            <rect width="48" height="48" rx="12" fill="url(#ig-rg)"/>
            <rect x="11" y="11" width="26" height="26" rx="7" fill="none" stroke="#fff" stroke-width="3"/>
            <circle cx="24" cy="24" r="6.5" fill="none" stroke="#fff" stroke-width="3"/>
            <circle cx="33.5" cy="14.5" r="2.2" fill="#fff"/>
          </svg>
        </a>
        <a href="https://x.com/meclipthailand" class="sup-link" target="_blank" rel="noopener" title="X">
          <svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="#000"/>
            <path fill="#fff" d="M36.5 9h-5L24 18.8 16.5 9h-5l10.2 14.1L11 39h5l8.8-10.2L33.5 39h5L27.5 24.5z M34 36.5h-2.4L14 11.5h2.4z"/>
          </svg>
        </a>
        <a href="https://web.facebook.com/profile.php?id=61574323546875" class="sup-link" target="_blank" rel="noopener" title="Facebook">
          <svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <rect width="48" height="48" rx="12" fill="#1877F2"/>
            <path fill="#fff" d="M32 9h-4.5C24.4 9 22 11.4 22 14.5V18h-4v6h4v15h6V24h4l1-6h-5v-3c0-1.7.7-2.5 2.5-2.5H32V9z"/>
          </svg>
        </a>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let lang = 'th';
let prog = 'regular';
const ST = {};
let customMinor = [];
let customFree  = [];
let searchQ = '';
let statusFilter = 'all';

function getActiveSections() { return prog === 'intl' ? SECTIONS_INTL : SECTIONS; }

// ══════════════════════════════════════════
// TRANSLATIONS
// ══════════════════════════════════════════
const T = {
  th: {
    progRegular: 'ภาคปกติ', progIntl: 'นานาชาติ',
    subtitle: 'กรอกวิชาที่เคยเรียนมาแล้ว แล้วระบบจะสรุปแผนการเรียนให้อัตโนมัติ\nหลักสูตรเศรษฐศาสตรบัณฑิต มช. แบบ 2 สหกิจศึกษา (135 หน่วยกิต)',
    tipTitle: 'วิธีกรอก:', tipBody: 'คลิกที่ปุ่มด้านขวาของแต่ละวิชาเพื่อเปลี่ยนสถานะ',
    chipNone: 'ยังไม่เรียน', chipCur: 'กำลังเรียนอยู่ 🟣', chipDone: 'ผ่านแล้ว ✅',
    yearLabel: 'ปัจจุบันกำลังขึ้น',
    yearOpts: ['ปี 1 เทอม 1','ปี 1 เทอม 2','ปี 2 เทอม 1','ปี 2 เทอม 2','ปี 3 เทอม 1','ปี 3 เทอม 2','ปี 4 เทอม 1','ปี 4 เทอม 2'],
    btnGen: 'ดูแผนการเรียนของฉัน →', btnBack: '← แก้ไขข้อมูล',
    tagReq: 'บังคับ', pickLabel: (n,t) => `เลือกแล้ว ${n} / ${t}`,
    sNone: 'ยังไม่เรียน', sCur: 'กำลังเรียน 🟣', sDone: 'ผ่านแล้ว ✅',
    grade: 'เกรด',
    colCode:'รหัส', colName:'ชื่อวิชา', colCr:'cr', colStatus:'สถานะ',
    customCode:'รหัสวิชา เช่น 707201', customName:'ชื่อวิชา', customCr:'cr',

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('lt-th').className = 'seg-opt' + (l==='th'?' active':'');
  document.getElementById('lt-en').className = 'seg-opt' + (l==='en'?' active':'');
  applyTranslations();
  buildForm();
  renderCustom('minor');
  renderCustom('free');
}

function setProg(p) {
  prog = p;
  searchQ = ''; statusFilter = 'all';
  const si = document.getElementById('search-input');
  if (si) si.value = '';
  const cb = document.getElementById('search-clear-btn');
  if (cb) cb.style.display = 'none';
  document.getElementById('pt-regular').className = 'seg-opt' + (p==='regular'?' active':'');
  document.getElementById('pt-intl').className    = 'seg-opt' + (p==='intl'?' active':'');

  if (p === 'intl') {
    applyTranslations();
  } else {

    buildForm();
    renderCustom('minor');
    renderCustom('free');

}

function buildForm() {
  const t = T[lang];
  let h = '';
  getActiveSections().forEach(sec => {
    const secLabel = lang==='en' ? sec.labelEn : sec.label;
    h += `<div class="acc-section">
      <div class="acc-header" onclick="toggleAcc('${sec.id}')">
        <span>${secLabel}</span>
        <div class="acc-right">
          <span class="acc-cr-badge" id="badge-${sec.id}">0 / ${sec.req} cr</span>
          <span id="arr-${sec.id}" style="color:#a0aec0;font-size:12px;transition:transform .2s">▶</span>
        </div>
      </div>
      <div class="acc-body" id="acc-${sec.id}">`;
    sec.groups.forEach((g, gi) => {
      const gLabel = lang==='en' ? g.labelEn : g.label;
      if (g.pick) {
        const pickId = `pick-${sec.id}-${gi}`;
        const sel = g.courses.filter(c=>ST[c.code]?.s&&ST[c.code].s!=='none').length;
        h += `<div style="padding:10px 12px 4px">
          <div class="grp-pick">
            <div class="grp-pick-hdr">
              <span class="grp-pick-title">🔵 ${gLabel}</span>
              <span class="pick-cnt ${sel>=g.pick?'ok':'ng'}" id="${pickId}-cnt">${t.pickLabel(sel,g.pick)}</span>
            </div>
            <div class="tbl-head"><span>${t.colCode}</span><span>${t.colName}</span><span>${t.colCr}</span><span style="text-align:right">${t.colStatus}</span></div>`;
        g.courses.forEach(c => { h += courseRow(c, sec.id, pickId); });
        h += `</div></div>`;
      } else {
        h += `<div class="grp-req-hdr"><span class="lbl">📌 ${gLabel}</span><span class="tag-req">${t.tagReq}</span></div>
          <div class="tbl-head"><span>${t.colCode}</span><span>${t.colName}</span><span>${t.colCr}</span><span style="text-align:right">${t.colStatus}</span></div>`;
        g.courses.forEach(c => { h += courseRow(c, sec.id, null); });
      }
    });
    h += `</div></div>`;
  });

  const minorLabel = lang==='en' ? '7. Minor (≥15 cr) — add manually' : '7. วิชาโท (≥15 cr) — เพิ่มเองได้เลย';
  const freeLabel  = lang==='en' ? '8. Free Elective (≥6 cr) — add manually' : '8. วิชาเลือกเสรี (≥6 cr) — เพิ่มเองได้เลย';
  h += customSection('minor', minorLabel);
  h += customSection('free',  freeLabel);

  document.getElementById('form-sections').innerHTML = h;
  Object.keys(ST).forEach(code => {
    const s = ST[code]?.s;
    if (!s || s==='none') return;
    const btn = document.getElementById('sb-'+code);
    if (btn) { btn.className='s-btn '+s; btn.textContent = s==='current'?t.sCur:t.sDone; }
    const gi = document.getElementById('gi-'+code);
    if (gi) gi.style.display = s==='done'?'inline':'none';
  });
  renderSearchPanel();
}

function courseRow(c, secId, pickId) {
  const t = T[lang];
  const s = ST[c.code]?.s||'none';
  const g = ST[c.code]?.g||'';
  const label = s==='none'?t.sNone:s==='current'?t.sCur:t.sDone;
  return `<div class="c-row${s!=='none'?' '+s:''}" id="row-${c.code}">
    <span class="td-code">${c.code}</span>
    <span class="td-name">${c.name}</span>
    <span class="td-cr">${c.cr}</span>
    <span class="td-act">
      <button class="s-btn ${s}" id="sb-${c.code}"
        onclick="cycleStatus('${c.code}',${c.cr},'${secId}','${pickId||''}')">${label}</button>
      <input type="text" class="g-input" id="gi-${c.code}" placeholder="${t.grade}"
        style="display:${s==='done'?'inline':'none'}" value="${g}" oninput="ST['${c.code}'].g=this.value">
    </span>
  </div>`;
}

function customSection(type, label) {
  const t = T[lang];
  return `<div class="acc-section">

      <span>${label}</span>

// ══════════════════════════════════════════
// CYCLE STATUS
// ══════════════════════════════════════════
function cycleStatus(code, cr, secId, pickId) {
  if (!ST[code]) ST[code]={s:'none',g:''};
  ST[code].s = ST[code].s==='none'?'current':ST[code].s==='current'?'done':'none';
  const s=ST[code].s, t=T[lang];
  const btn=document.getElementById('sb-'+code), gi=document.getElementById('gi-'+code);
  btn.className='s-btn '+s;
  btn.textContent = s==='none'?t.sNone:s==='current'?t.sCur:t.sDone;
  gi.style.display = s==='done'?'inline':'none';
  const row=document.getElementById('row-'+code);
  if(row) row.className='c-row'+(s!=='none'?' '+s:'');
  refreshBadge(secId);
  if(pickId) refreshPickCounter(pickId);
  if (document.getElementById('search-results-panel')?.style.display !== 'none') renderSearchPanel();
}

function refreshBadge(secId) {
  const sec=getActiveSections().find(x=>x.id===secId); if(!sec) return;
  const all=sec.groups.flatMap(g=>g.courses);
  const done=all.filter(c=>ST[c.code]?.s==='done').reduce((a,c)=>a+c.cr,0);
  const cur =all.filter(c=>ST[c.code]?.s==='current').reduce((a,c)=>a+c.cr,0);
  const b=document.getElementById('badge-'+secId);
  if(b) b.textContent=(done||cur)?`${done}cr ✅${cur?' +'+cur+'cr 🟣':''}`:`0 / ${sec.req} cr`;
}

function refreshPickCounter(pickId) {
  const parts=pickId.split('-'), secId=parts[1], gi=parseInt(parts[2]);
  const sec=getActiveSections().find(x=>x.id===secId); if(!sec) return;
  const grp=sec.groups[gi]; if(!grp?.pick) return;
  const sel=grp.courses.filter(c=>ST[c.code]?.s&&ST[c.code].s!=='none').length;
  const el=document.getElementById(pickId+'-cnt'); if(!el) return;
  el.textContent=T[lang].pickLabel(sel,grp.pick);
  el.className='pick-cnt '+(sel>=grp.pick?'ok':'ng');
}

function toggleAcc(id) {
  const body=document.getElementById('acc-'+id), arr=document.getElementById('arr-'+id);
  const open=body.classList.toggle('open');
  if(arr) arr.style.transform=open?'rotate(90deg)':'';
}

function addCustom(type) {
  const t=T[lang];
  const code=document.getElementById(type+'-code').value.trim();
  const name=document.getElementById(type+'-name').value.trim();
  const cr=parseInt(document.getElementById(type+'-cr').value)||3;
  if(!code&&!name) return;
  const arr=type==='minor'?customMinor:customFree;
  arr.push({code:code||'???',name:name||'—',cr,s:'done'});
  document.getElementById(type+'-code').value='';
  document.getElementById(type+'-name').value='';
  renderCustom(type);
}
function removeCustom(type,i){(type==='minor'?customMinor:customFree).splice(i,1);renderCustom(type);}
function cycleCustom(type,i){const arr=type==='minor'?customMinor:customFree;arr[i].s=arr[i].s==='current'?'done':'current';renderCustom(type);}
function renderCustom(type) {
  const t=T[lang], arr=type==='minor'?customMinor:customFree;
  const list=document.getElementById('list-'+type); if(!list) return;
  if(!arr.length){list.innerHTML=`<p style="font-size:12.5px;color:#a0aec0;padding:8px 4px">${t.noCustom}</p>`;return;}
  list.innerHTML=arr.map((c,i)=>`
    <div class="custom-item">
      <button class="s-btn ${c.s}" onclick="cycleCustom('${type}',${i})" style="font-size:11.5px;padding:3px 9px">
        ${c.s==='current'?t.sCur:t.sDone}
      </button>
      <span style="font-weight:700;font-size:12.5px;min-width:54px">${c.code}</span>
      <span style="flex:1;font-size:12.5px">${c.name}</span>
      <span style="font-size:11.5px;color:#a0aec0">${c.cr} cr</span>
      <button class="btn-remove" onclick="removeCustom('${type}',${i})">×</button>
    </div>`).join('');
  const done=arr.filter(c=>c.s==='done').reduce((a,c)=>a+c.cr,0);
  const cur=arr.filter(c=>c.s==='current').reduce((a,c)=>a+c.cr,0);
  const b=document.getElementById('badge-'+type);
  if(b) b.textContent=(done||cur)?`${done}cr ✅${cur?' +'+cur+'cr 🟣':''}`:'0 cr';
}

// GENERATE RESULT
// ══════════════════════════════════════════
function generateResult() {
  const [yr,sem]=document.getElementById('sel-ys').value.split('-');
  const t=T[lang];
  const activeSec=getActiveSections();
  const isIntl=prog==='intl';

  function sumSec(id,s){
    const sec=activeSec.find(x=>x.id===id); if(!sec) return 0;
    return sec.groups.flatMap(g=>g.courses).filter(c=>ST[c.code]?.s===s).reduce((a,c)=>a+c.cr,0);
  }

  const geDone=sumSec('ge','done'),geCur=sumSec('ge','current');
  const crqDone=sumSec('core_req','done');
  const celDone=sumSec('core_elec','done'),celCur=sumSec('core_elec','current');
  const mrqDone=sumSec('major_req','done'),mrqCur=sumSec('major_req','current');
  const melDone=sumSec('major_elec','done'),melCur=sumSec('major_elec','current');
  const coopDone=sumSec('coop','done'),coopCur=sumSec('coop','current');
  const minDone=customMinor.filter(c=>c.s==='done').reduce((a,c)=>a+c.cr,0);
  const minCur=customMinor.filter(c=>c.s==='current').reduce((a,c)=>a+c.cr,0);
  const freDone=customFree.filter(c=>c.s==='done').reduce((a,c)=>a+c.cr,0);
  const freCur=customFree.filter(c=>c.s==='current').reduce((a,c)=>a+c.cr,0);

  const coreTotal=isIntl?33:30;
  const majReqCr=isIntl?45:42;
  const ceReq=isIntl?21:12;
  const ce4done=isIntl?melDone:coopDone+melDone;
  const ce4cur=isIntl?melCur:coopCur+melCur;

  const totalDone=geDone+crqDone+celDone+mrqDone+melDone+coopDone+minDone+freDone;
  const pct=Math.min(100,Math.round(totalDone/135*100));

  function chip(c){
    const s=ST[c.code]?.s||'none',g=ST[c.code]?.g||'';
    const cls=s==='done'?'done':s==='current'?'current':'opt';
    const ico=s==='done'?'✅':s==='current'?'🟣':'';
    return `<span class="course-chip ${cls}">${c.code} ${c.name}${ico?' '+ico:''}${g?' <span class="grade-tag">'+g+'</span>':''}</span>`;
  }
  function secChips(id){const sec=activeSec.find(x=>x.id===id);if(!sec)return '';return sec.groups.flatMap(g=>g.courses).map(chip).join('');}
  function node(id,label,badge,cls,inner,open=''){
    return `<li><span class="node-label section" onclick="tn('${id}')">
      <span class="toggle-icon" id="ni-${id}">${open?'▼':'▶'}</span>${label}
      <span class="badge ${cls}">${badge}</span></span>
      <div class="collapsible${open?' open':''}" id="nd-${id}">${inner}</div></li>`;
  }
  function sub(id,label,inner,badge='',badgeCls='info'){
    const bdg=badge?` <span class="badge ${badgeCls}">${badge}</span>`:'';
    return `<li><span class="node-label" onclick="tn('${id}')">
      <span class="toggle-icon" id="ni-${id}">▶</span>${label}${bdg}</span>
      <div class="collapsible" id="nd-${id}">${inner}</div></li>`;
  }
  function _sb(d,c,r,useN=false){
    const cls=d>=r?'done':d>0||c>0?'warn':'miss';
    const lack=r-d;
    const unit=useN?(lang==='th'?' วิชา':' courses'):(lang==='th'?' cr':' cr');
    const curS=c?`<span style="color:#553c9a"> +${c}🟣</span>`:'';
    const lackS=lack>0?` <span style="font-size:10px;color:#e53e3e;font-weight:700">(${lang==='th'?'ขาดอีก ':'need '}${lack}${unit})</span>`:'';
    return {b:`${d}${curS} / ${r}${unit}${lackS}`,cls};
  }
  function cr2(d,c,r){
    const base=`${d}${c?`<span style="color:#553c9a"> +${c}🟣</span>`:''} / ${r}`;
    const lack=r-d;
    if(lack>0){
      const lbl=lang==='th'?`ขาดอีก ${lack} cr`:`need ${lack} more cr`;
      return base+` <span style="font-size:10px;color:#e53e3e;font-weight:700">(${lbl})</span>`;
    }
    return base;
  }

  const geS=geDone>=30?'done':geDone>0?'warn':'miss';
  const coreS=(crqDone+celDone)>=coreTotal?'done':(crqDone+celDone)>0?'warn':'miss';
  const majS=mrqDone>=majReqCr?'done':mrqDone>0?'warn':'miss';
  const ceS=ce4done>=ceReq?'done':ce4done>0?'warn':'miss';
  const minS=minDone>=15?'done':minDone>0?'warn':'miss';
  const freS=freDone>=6?'done':freDone>0?'warn':'miss';

  const ge1=isIntl
    ?['001101','001102','001201','001228','204100','261111','953111','359206','888102']
    :['001101','001102','001201','001228','261111','204100','953111','176104','851100','888102'];
  const ge2=isIntl?['703103']:['703103','201114','063101','851103'];
  const ge3=isIntl?['140104','154104','159151','951100']:['140104','057139','154104','951100'];
  function geChips(codes){return activeSec[0].groups.flatMap(g=>g.courses).filter(c=>codes.includes(c.code)).map(chip).join('');}

  // sub-node badge calculations
  const _geAll=activeSec[0].groups.flatMap(g=>g.courses);
  function _geD(codes){return _geAll.filter(c=>codes.includes(c.code)&&ST[c.code]?.s==='done').reduce((a,c)=>a+c.cr,0);}
  function _geC(codes){return _geAll.filter(c=>codes.includes(c.code)&&ST[c.code]?.s==='current').reduce((a,c)=>a+c.cr,0);}
  const ge1b=_sb(_geD(ge1),_geC(ge1),18);
  const ge2b=_sb(_geD(ge2),_geC(ge2),isIntl?3:6);
  const ge3b=_sb(_geD(ge3),_geC(ge3),isIntl?9:6);
  const _crqAll=activeSec.find(x=>x.id==='core_req').groups.flatMap(g=>g.courses);
  const crqb=_sb(_crqAll.filter(c=>ST[c.code]?.s==='done').reduce((a,c)=>a+c.cr,0),_crqAll.filter(c=>ST[c.code]?.s==='current').reduce((a,c)=>a+c.cr,0),isIntl?18:15);
  const _celAll2=activeSec.find(x=>x.id==='core_elec').groups.flatMap(g=>g.courses);
  const celb=_sb(_celAll2.filter(c=>ST[c.code]?.s==='done').length,_celAll2.filter(c=>ST[c.code]?.s==='current').length,5,true);

  const melAll=activeSec.find(x=>x.id==='major_elec').groups.flatMap(g=>g.courses);
  let node4Inner;
  if(isIntl){
    const electLbl=lang==='en'?`Major Elective ≥${ceReq} cr`:`วิชาเอกเลือก ≥${ceReq} หน่วยกิต`;
    const dblNote=lang==='en'
      ?'<p style="font-size:11.5px;color:#718096;padding:4px 10px 8px;font-style:italic">⚠ 751325, 751419, 751447 enrolled as Core Elective cannot also be counted here.</p>'
      :'<p style="font-size:11.5px;color:#718096;padding:4px 10px 8px;font-style:italic">⚠ 751325, 751419, 751447 ที่ลงทะเบียนเป็นวิชาแกนเลือกแล้ว ไม่สามารถนับซ้ำที่นี่ได้</p>';
    node4Inner=`<div class="course-list">
      <p style="font-size:12px;color:#718096;margin-bottom:4px">${electLbl}</p>
      ${melAll.map(chip).join('')}${dblNote}</div>`;
  } else {
    const coopAll=activeSec.find(x=>x.id==='coop').groups.flatMap(g=>g.courses);
    node4Inner=`<div class="course-list">
      <p style="font-size:12px;color:#718096;margin-bottom:4px">${t.coopLabel}</p>
      ${coopAll.map(chip).join('')}
      <p style="font-size:12px;color:#718096;margin:6px 0 4px">${t.electLabel}</p>
      ${melAll.map(chip).join('')}</div>`;
  }

  const minorInner=customMinor.length?`<div class="course-list">${customMinor.map(c=>`<span class="course-chip ${c.s==='done'?'done':'current'}">${c.code} ${c.name} ${c.s==='done'?'✅':'🟣'}</span>`).join('')}</div>`:`<div class="course-list"><p class="note">${t.noMinor}</p></div>`;
  const freeInner=customFree.length?`<div class="course-list">${customFree.map(c=>`<span class="course-chip ${c.s==='done'?'done':'current'}">${c.code} ${c.name} ${c.s==='done'?'✅':'🟣'}</span>`).join('')}</div>`:`<div class="course-list"><p class="note">${t.noFree}</p></div>`;

  const sb=t.subGe, sc=t.subCore;
  const nl0=lang==='en'?'1. General Education (GE)':'1. หมวด GE';
  const nl1=lang==='en'?'2. Core Courses':'2. วิชาแกน';
  const nl2=lang==='en'?`3. Major Required (${majReqCr} cr)`:`3. วิชาเอกบังคับ (${majReqCr} cr)`;
  const nl3=isIntl
    ?(lang==='en'?`4. Major Elective (≥${ceReq} cr)`:`4. วิชาเอกเลือก (≥${ceReq} cr)`)
    :(lang==='en'?'4. Coop + Major Elective':'4. สหกิจ + วิชาเอกเลือก');
  const nl4=lang==='en'?'5. Minor (15 cr)':'5. วิชาโท (15 cr)';
  const nl5=lang==='en'?'6. Free Elective (6 cr)':'6. วิชาเลือกเสรี (6 cr)';

  const cardLabels=isIntl
    ?(lang==='en'?['GE','Core','Major Req.','Major Elec.','Minor','Free Elec.']:['GE','วิชาแกน','วิชาเอกบังคับ','วิชาเอกเลือก','วิชาโท','เลือกเสรี'])
    :t.cards;
  const cardData=[{s:geS,d:geDone,r:30},{s:coreS,d:crqDone+celDone,r:coreTotal},{s:majS,d:mrqDone,r:majReqCr},{s:ceS,d:ce4done,r:ceReq},{s:minS,d:minDone,r:15},{s:freS,d:freDone,r:6}];

  const subtitle=isIntl?t.resultSubIntl(yr,sem):t.resultSub(yr,sem);
  const html=`
    <h1 class="t-title">🎓 ${t.resultTitle}</h1>
    <p class="subtitle">${subtitle}</p>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <p style="font-size:13px;color:#718096;margin-bottom:12px">${t.crDone(totalDone,135)} (${pct}%)</p>
    <div class="legend">
      <span>${lang==='th'?'สัญลักษณ์:':'Legend:'}</span>
      <span class="course-chip done" style="margin:0">${t.legPassed}</span>
      <span class="course-chip current" style="margin:0">${t.legCur}</span>
      <span class="course-chip opt" style="margin:0">${t.legNone}</span>
    </div>
    <div class="summary-grid">
      ${cardData.map((c,i)=>`<div class="card ${c.s}"><div class="card-label">${cardLabels[i]}</div><div class="card-value">${c.d}/${c.r}</div></div>`).join('')}
    </div>
    <ul class="tree">
      ${node('ge',nl0,cr2(geDone,geCur,30),geS,`<ul class="tree">
        ${sub('ge1',sb[0],`<div class="course-list">${geChips(ge1)}</div>`,ge1b.b,ge1b.cls)}
        ${sub('ge2',sb[1],`<div class="course-list">${geChips(ge2)}</div>`,ge2b.b,ge2b.cls)}
        ${sub('ge3',sb[2],`<div class="course-list">${geChips(ge3)}</div>`,ge3b.b,ge3b.cls)}
      </ul>`,'open')}
      ${node('core',nl1,cr2(crqDone+celDone,celCur,coreTotal),coreS,`<ul class="tree">
        ${sub('crq',sc[0],`<div class="course-list">${secChips('core_req')}</div>`,crqb.b,crqb.cls)}
        ${sub('cel',sc[1],`<div class="course-list">${secChips('core_elec')}</div>`,celb.b,celb.cls)}
      </ul>`)}
      ${node('mrq',nl2,cr2(mrqDone,mrqCur,majReqCr),majS,`<div class="course-list">${secChips('major_req')}</div>`)}
      ${node('ce',nl3,cr2(ce4done,ce4cur,ceReq),ceS,node4Inner)}
      ${node('min',nl4,cr2(minDone,minCur,15),minS,minorInner)}
      ${node('fre',nl5,cr2(freDone,freCur,6),freS,freeInner)}
    </ul>`;

  document.getElementById('result-content').innerHTML=html;
  document.getElementById('screen-setup').style.display='none';
  document.getElementById('screen-result').style.display='block';
  window.scrollTo(0,0);
}

function tn(id){
  const el=document.getElementById('nd-'+id),ic=document.getElementById('ni-'+id);
  el.classList.toggle('open');
  if(ic) ic.textContent=el.classList.contains('open')?'▼':'▶';
}
function goBack(){
  document.getElementById('screen-result').style.display='none';
  document.getElementById('screen-setup').style.display='block';
  window.scrollTo(0,0);
}

// ══════════════════════════════════════════
// SEARCH & FILTER
// ══════════════════════════════════════════
function onSearch() {
  searchQ = document.getElementById('search-input').value.trim().toLowerCase();
  document.getElementById('search-clear-btn').style.display = searchQ ? 'inline' : 'none';
  renderSearchPanel();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQ = '';
  document.getElementById('search-clear-btn').style.display = 'none';
  renderSearchPanel();
}

function setFilter(f) {
  statusFilter = f;
  ['all','none','current','done'].forEach(x => {
    const btn = document.getElementById('sf-'+x);
    if (btn) btn.className = 'sf-btn' + (x===f ? ' sf-active-'+x : '');
  });
  renderSearchPanel();
}

function renderSearchPanel() {
  const panel = document.getElementById('search-results-panel');
  const form = document.getElementById('form-sections');
  if (!panel || !form) return;
  const isActive = searchQ.length > 0 || statusFilter !== 'all';

  if (!isActive) {
    panel.style.display = 'none';
    form.style.display = 'block';
    return;
  }

  panel.style.display = 'block';
  form.style.display = 'none';

  const seen = new Set();
  let courses = [];
  getActiveSections().forEach(sec => {
    sec.groups.forEach(g => {
      g.courses.forEach(c => {
        if (!seen.has(c.code)) { seen.add(c.code); courses.push({...c, secId: sec.id}); }
      });
    });
  });

  if (searchQ) {
    courses = courses.filter(c =>
      c.code.toLowerCase().includes(searchQ) ||
      c.name.toLowerCase().includes(searchQ)
    );
  }
  if (statusFilter !== 'all') {
    courses = courses.filter(c => (ST[c.code]?.s || 'none') === statusFilter);
  }

  const t = T[lang];
  if (!courses.length) {
    panel.innerHTML = `<div class="search-panel"><div class="search-empty">${lang==='th'?'ไม่พบวิชาที่ค้นหา':'No courses found'}</div></div>`;
    return;
  }

  const countTxt = lang==='th' ? `พบ ${courses.length} วิชา` : `${courses.length} course${courses.length>1?'s':''} found`;
  let html = `<div class="search-panel"><div class="search-count">${countTxt}</div>`;
  html += `<div class="tbl-head"><span>${t.colCode}</span><span>${t.colName}</span><span>${t.colCr}</span><span style="text-align:right">${t.colStatus}</span></div>`;
  courses.forEach(c => { html += courseRow(c, c.secId, null); });
  html += `</div>`;
  panel.innerHTML = html;

  Object.keys(ST).forEach(code => {
    const s = ST[code]?.s;
    if (!s || s==='none') return;
    const btn = document.getElementById('sb-'+code);
    if (btn) { btn.className='s-btn '+s; btn.textContent = s==='current'?t.sCur:t.sDone; }
    const gi = document.getElementById('gi-'+code);
    if (gi) { gi.style.display = s==='done'?'inline':'none'; gi.value = ST[code].g||''; }
  });
}

// Save current courses to localStorage for grade calculator
function saveForGrades() {
  const allCourses = getActiveSections().flatMap(sec => sec.groups.flatMap(g => g.courses));
  const current = allCourses.filter(c => ST[c.code]?.s === 'current').map(c => ({code:c.code, name:c.name, cr:c.cr}));
  customMinor.filter(c => c.s === 'current').forEach(c => current.push({code:c.code, name:c.name, cr:c.cr}));
  customFree.filter(c => c.s === 'current').forEach(c => current.push({code:c.code, name:c.name, cr:c.cr}));
  if (!current.length) { alert(lang==='th'?'ยังไม่มีวิชาที่มีสถานะ "กำลังเรียน" — กดปุ่มขวาของแต่ละวิชาเพื่อตั้งสถานะก่อนนะ':'No courses marked as "current" yet.'); return; }
  localStorage.setItem('hub_current_courses', JSON.stringify(current));
  sessionStorage.setItem('hub_goto','grades');
  window.location.href = './';
}
function goPayment(){
  sessionStorage.setItem('hub_goto','payment');
  window.location.href = './';
}

// Init
applyTranslations();
buildForm();
</script>
